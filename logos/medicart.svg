<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <rect width="200" height="80" fill="#fff"/>
  <!-- Medical trolley icon -->
  <g transform="translate(6,8)">
    <rect x="6" y="8" width="36" height="30" rx="3" stroke="#922b45" stroke-width="3" fill="none"/>
    <line x1="14" y1="38" x2="14" y2="48" stroke="#922b45" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="34" y1="38" x2="34" y2="48" stroke="#922b45" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="14" cy="51" r="4" fill="#922b45"/>
    <circle cx="34" cy="51" r="4" fill="#922b45"/>
    <!-- cross on cart -->
    <line x1="24" y1="14" x2="24" y2="32" stroke="#922b45" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="15" y1="23" x2="33" y2="23" stroke="#922b45" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="58" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#922b45" letter-spacing="-0.3">Medi<tspan font-weight="300" fill="#333">cart</tspan></text>
  <text x="58" y="48" font-family="Arial, sans-serif" font-size="8.5" fill="#888" letter-spacing="0.8">MEDICAL TROLLEYS · ENGLAND</text>
</svg>
