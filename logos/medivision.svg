<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <rect width="200" height="80" fill="#fff"/>
  <!-- Monitor icon -->
  <g transform="translate(8,10)">
    <rect x="2" y="4" width="46" height="32" rx="4" stroke="#2e4b9e" stroke-width="3" fill="none"/>
    <line x1="14" y1="36" x2="14" y2="44" stroke="#2e4b9e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="36" y1="36" x2="36" y2="44" stroke="#2e4b9e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="8" y1="44" x2="42" y2="44" stroke="#2e4b9e" stroke-width="2.5" stroke-linecap="round"/>
    <!-- ECG on screen -->
    <polyline points="6,20 10,20 12,13 14,27 16,20 22,20 24,14 26,26 28,20 44,20"
              stroke="#2e4b9e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="65" y="30" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#2e4b9e">Medi<tspan font-weight="300">vision</tspan></text>
  <text x="65" y="48" font-family="Arial, sans-serif" font-size="8.5" fill="#888" letter-spacing="0.8">SURGICAL MONITORS · USA</text>
</svg>
